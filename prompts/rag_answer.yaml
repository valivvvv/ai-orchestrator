name: rag_answer
version: "1.0.0"
description: Generează răspunsul final

prompt: |
  Răspunde la întrebare folosind contextul.

  {% if history %}
  CONVERSAȚIE ANTERIOARĂ:
  {% for msg in history %}
  {{ msg.role }}: {{ msg.content }}
  {% endfor %}
  {% endif %}

  ÎNTREBARE: {{ query }}

  CONTEXT:
  {{ context }}

  Răspunde concis. Menționează sursa când citezi.
